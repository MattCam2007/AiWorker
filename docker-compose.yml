version: '3.8'
services:
  terminaldeck:
    build: .
    init: true
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - /home/matt/Projects:/workspace
      - /home/matt/.ssh:/home/matt/.ssh:ro
      - /home/matt/.claude:/home/matt/.claude
      - /home/matt/.claude.json:/home/matt/.claude.json
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
    environment:
      - TERMINALDECK_PORT=3000
      - SSH_AUTH_SOCK=/ssh-agent
    restart: unless-stopped
