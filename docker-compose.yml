services:
  terminaldeck:
    build: .
    init: true
    ports:
      - "${TERMINALDECK_PORT:-3000}:3000"
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - ./config:/app/config
      - ${WORKSPACE_PATH:-./workspace}:/workspace
      - ${SSH_KEYS_PATH:-/dev/null}:/home/terminaldeck/.ssh:ro
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      - ${CLAUDE_CONFIG_PATH:-/dev/null}:/home/terminaldeck/.claude
      - ${CLAUDE_JSON_PATH:-/dev/null}:/home/terminaldeck/.claude.json
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TERMINALDECK_PORT=3000
      - SSH_AUTH_SOCK=/ssh-agent
    restart: unless-stopped
