<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerminalDeck</title>
  <link rel="stylesheet" href="vendor/xterm.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside id="sidebar" class="sidebar hidden">
    <div class="sidebar-header">
      <span class="sidebar-title">TerminalDeck</span>
      <button id="sidebar-close-btn" class="sidebar-close">&times;</button>
    </div>
    <div class="sidebar-sections">
      <div class="sidebar-section">
        <div class="section-header" data-section="terminals">
          <span class="section-toggle">&#9660;</span>
          <span class="section-title">Terminals</span>
        </div>
        <div id="terminal-list" class="section-content"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-header" data-section="notes">
          <span class="section-toggle">&#9660;</span>
          <span class="section-title">Notes</span>
        </div>
        <div id="note-list" class="section-content"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-header" data-section="files">
          <span class="section-toggle">&#9660;</span>
          <span class="section-title">Files</span>
          <span class="section-header-spacer"></span>
          <button id="file-tree-refresh-btn" class="ft-refresh-btn" title="Refresh file list">&#x21bb;</button>
        </div>
        <div id="file-tree" class="section-content"></div>
      </div>
    </div>
  </aside>

  <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

  <div id="main-content">
    <header id="header">
      <button id="sidebar-toggle-btn" class="sidebar-toggle" title="Toggle file tree">
        <span class="hamburger-icon"></span>
      </button>
      <span class="title">TerminalDeck</span>
      <div id="grid-presets"></div>
      <div class="spacer"></div>
      <button id="notification-toggle-btn" class="notification-toggle" title="Toggle notifications">Bell</button>
      <button id="add-terminal-btn">+</button>
      <div id="connection-status" class="status-indicator"></div>
    </header>

    <main id="grid-container"></main>
  </div>

  <!-- Command Palette: slide-out drawer on the left -->
  <div id="command-palette" class="command-palette hidden">
    <div class="cp-header">
      <input id="cp-search" class="cp-search-input" type="text" placeholder="Search commands..." autocomplete="off">
      <button id="cp-close-btn" class="cp-close">&times;</button>
    </div>
    <div id="cp-list" class="cp-list"></div>
  </div>
  <div id="cp-backdrop" class="cp-backdrop hidden"></div>

  <div id="ephemeral-dialog" class="hidden"></div>
  <div id="ephemeral-backdrop" class="hidden"></div>

  <!-- Mobile toolbar: sits above virtual keyboard -->
  <div id="mobile-toolbar">
    <div class="mobile-toolbar-handle"></div>
    <div class="mt-mode-tabs">
      <button class="mt-mode-tab mt-mode-tab-active" data-mode="keys">Keys</button>
      <button class="mt-mode-tab" data-mode="search">Search</button>
      <button class="mt-mode-tab" data-mode="cmds">Cmds</button>
      <button class="mt-mode-tab" data-mode="sessions">Sessions</button>
    </div>
    <!-- Keys panel (existing keyboard buttons) -->
    <div class="mt-panel mt-panel-active" data-panel="keys">
      <!-- Row 1 -->
      <button class="mobile-toolbar-btn" data-key="esc">esc</button>
      <button class="mobile-toolbar-btn" data-key="slash">/</button>
      <button class="mobile-toolbar-btn" data-key="pipe">|</button>
      <button class="mobile-toolbar-btn" data-key="dash">-</button>
      <button class="mobile-toolbar-btn" data-key="home">home</button>
      <button class="mobile-toolbar-btn" data-key="up">&#x2191;</button>
      <button class="mobile-toolbar-btn" data-key="end">end</button>
      <button class="mobile-toolbar-btn" data-key="pgup">pgup</button>
      <!-- Row 2 -->
      <button class="mobile-toolbar-btn" data-key="tab">tab</button>
      <button class="mobile-toolbar-btn" data-key="tilde">~</button>
      <button class="mobile-toolbar-btn" data-key="ctrl">ctrl</button>
      <button class="mobile-toolbar-btn" data-key="alt">alt</button>
      <button class="mobile-toolbar-btn" data-key="left">&#x2190;</button>
      <button class="mobile-toolbar-btn" data-key="down">&#x2193;</button>
      <button class="mobile-toolbar-btn" data-key="right">&#x2192;</button>
      <button class="mobile-toolbar-btn" data-key="pgdn">pgdn</button>
      <!-- Row 3 (expanded) -->
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="colon">:</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="semicolon">;</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="backslash">\</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="singlequote">'</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="doublequote">"</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="bang">!</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="ampersand">&amp;</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="dollar">$</button>
      <!-- Row 4 (expanded) -->
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="lparen">(</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="rparen">)</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="lbracket">[</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="rbracket">]</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="lbrace">{</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="rbrace">}</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="lt">&lt;</button>
      <button class="mobile-toolbar-btn mobile-toolbar-extra" data-key="gt">&gt;</button>
    </div>
    <!-- Search panel -->
    <div class="mt-panel" data-panel="search">
      <div class="mt-search-row">
        <input id="mt-search-input" class="mt-search-input" type="text" placeholder="Find in terminal..." autocomplete="off">
        <button id="mt-search-prev" class="mt-search-btn" title="Previous">&#x2191;</button>
        <button id="mt-search-next" class="mt-search-btn" title="Next">&#x2193;</button>
      </div>
      <div class="mt-search-options">
        <label class="mt-search-toggle"><input type="checkbox" id="mt-search-regex"> Regex</label>
        <label class="mt-search-toggle"><input type="checkbox" id="mt-search-case"> Case</label>
        <label class="mt-search-toggle"><input type="checkbox" id="mt-search-whole"> Word</label>
        <span id="mt-search-status" class="mt-search-status"></span>
      </div>
    </div>
    <!-- Cmds panel -->
    <div class="mt-panel" data-panel="cmds">
      <div class="mt-cmds-row">
        <input id="mt-cmds-input" class="mt-search-input" type="text" placeholder="Filter commands..." autocomplete="off">
      </div>
      <div id="mt-cmds-list" class="mt-cmds-list"></div>
    </div>
    <!-- Sessions panel -->
    <div class="mt-panel" data-panel="sessions">
      <div id="mt-sessions-list" class="mt-sessions-list"></div>
      <button id="mt-sessions-new" class="mt-sessions-new">+ New Terminal</button>
    </div>
  </div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/xterm-addon-fit.js"></script>
  <script src="vendor/xterm-addon-search.js"></script>
  <script src="vendor/fuse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/note-panel.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/filetree.js"></script>
  <script src="js/terminal-list.js"></script>
  <script src="js/command-palette.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
