# Enable mouse support (scroll, pane selection, resize)
set -g mouse on

# Scrollback history
set -g history-limit 10000

# Keep sessions/server alive even when processes or clients die
set -g destroy-unattached off
set -g exit-unattached off
set -g exit-empty off

# remain-on-exit is a WINDOW option — must use setw, not set
# This keeps panes alive (showing exit status) when the process exits,
# which prevents the window→session cascade destruction
setw -g remain-on-exit on

# Debug: log lifecycle events to trace session death sequence
set-hook -g pane-died "run-shell 'echo PANE_DIED >> /tmp/tmux-events.log'"
set-hook -g pane-exited "run-shell 'echo PANE_EXITED >> /tmp/tmux-events.log'"
set-hook -g session-closed "run-shell 'echo SESSION_CLOSED >> /tmp/tmux-events.log'"
set-hook -g client-detached "run-shell 'echo CLIENT_DETACHED >> /tmp/tmux-events.log'"
