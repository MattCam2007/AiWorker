# Ensure TERM inside tmux has a valid terminfo entry.
# Without this, tmux 3.3+ defaults to "tmux-256color" which may be
# missing from ncurses-base.  A missing terminfo causes readline to
# fall back to "dumb" mode — breaking tab completion and line editing.
set -g default-terminal "screen-256color"

# Enable mouse support (scroll, pane selection, resize)
set -g mouse on

# Scrollback history
set -g history-limit 10000

# Page Up/Down: enter copy-mode and scroll (useful for mobile toolbar)
bind -n PageUp copy-mode -eu
bind -T copy-mode-vi PageUp send-keys -X page-up
bind -T copy-mode-vi PageDown send-keys -X page-down

# Disable status bar — TerminalDeck has its own UI; the status bar
# just generates periodic PTY output that interferes with idle detection.
set -g status off

# Keep sessions/server alive even when processes or clients die
set -g destroy-unattached off
set -g exit-unattached off
set -g exit-empty off

# remain-on-exit is a WINDOW option — must use setw, not set
# This keeps panes alive (showing exit status) when the process exits,
# which prevents the window→session cascade destruction
setw -g remain-on-exit on
